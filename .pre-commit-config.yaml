repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pii-check
        name: PII/sensitive data check
        entry: python3 scripts/check_pii.py
        language: system
        stages: [commit]
        pass_filenames: false
